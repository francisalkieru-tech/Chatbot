<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kupal na Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-frame">
        <div class="chat-header">
            <div class="avatar">K</div>
            <div class="head-info">
                <div class="header-name">Kupal</div>
                <div class="header-status" id="header-status">Active Now</div>
            </div>
        </div>

        <div class="chat-messages" id="chat-messages">

        </div>

        <div class="suggested-replies" id="suggested-replies">

        </div>

        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Aa" autocomplete="off">
            <button id="send-btn">Send</button>
        </div>

    </div>
    <audio id="bgm" src="song.mp3" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
